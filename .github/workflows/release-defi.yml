name: Release (defi)
on:
  workflow_dispatch:
  push:
      branches:
        - defi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout
          uses: actions/checkout@v3

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v1

        - name : Meson Test
          run : DOCKER_BUILDKIT=1 docker build . --file dockerfiles/run_tests --progress plain

        - name: Docker Build
          run: DOCKER_BUILDKIT=1 docker build . -f dockerfiles/build_linux --output build

        - name: Docker Build Windows
          run: DOCKER_BUILDKIT=1 docker build . -f dockerfiles/build_windows --output ./build/windows
          # Note: macOS build disabled - requires fmt for aarch64-apple-darwin target which pkg-config
          # cannot provide during cross-compilation. See dockerfiles/README.md for details.

        - name: Call Docker
          uses: peter-evans/repository-dispatch@v3
          with:
            event-type: docker

        - name: Get version
          id: get_version
          run: |
           echo "VERSION=$(grep 'version :' meson.build | cut -d "'" -f 2)" >> $GITHUB_ENV

        - name: Rename artifacts for defi
          run: |
            mv ./build/wart-node-windows.exe ./build/wart-node-defi-beta-windows.exe
            mv ./build/wart-tui-windows.exe ./build/wart-tui-defi-beta-windows.exe
            mv ./build/wart-node-linux ./build/wart-node-defi-beta-linux
            mv ./build/wart-tui-linux ./build/wart-tui-defi-beta-linux

        - name: Release
          uses: softprops/action-gh-release@v2.2.1
          with:
            name: "Warthog Defi Beta {{ env.VERSION }}"
            tag_name: ${{ env.VERSION }}
            generate_release_notes: true
            make_latest: true
            files: |
              ./build/wart-node-defi-beta-windows.exe
              ./build/wart-tui-defi-beta-windows.exe
              ./build/wart-node-defi-beta-linux
              ./build/wart-tui-defi-beta-linux
